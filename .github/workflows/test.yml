name: CI

on:
  pull_request:
    branches: [main]

  workflow_dispatch:

# Least privilege: default all jobs to read-only.
# Only the pr-preview job elevates (see its own permissions block).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # workflow_dispatch lacks a diff base for paths-filter, so force-run all jobs.
      code: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'index.html'
              - 'vite.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'src/**'
              - 'tsconfig*.json'
              - 'eslint.config.js'
              - '.github/workflows/test.yml'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Build
        run: npm run build -- --base=${{ github.event_name == 'pull_request' && format('/drawing-practice/pr/{0}/', github.event.pull_request.number) || '/drawing-practice/' }}

      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-preview-dist
          path: dist
          retention-days: 1
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run test

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    # pull-requests:write is for the findings comment. Safe to grant: this job
    # runs no third-party code (--package-lock-only, no npm ci, no install).
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # Report-only: this job never fails CI. `--package-lock-only` audits
      # straight from the lockfile (no install); the exit code only decides
      # whether a PR comment is needed.
      - name: npm audit
        id: audit
        run: |
          if npm audit --package-lock-only --audit-level=high --omit=dev > audit.txt 2>&1; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi
          {
            echo '## npm audit (production deps)'
            echo '```'
            cat audit.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # The Actions summary is easy to miss, so surface findings as a sticky PR
      # comment: created when high+ vulnerabilities appear, removed once they
      # are resolved. Best-effort (continue-on-error) so it never blocks CI.
      - name: Comment audit findings on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          AUDIT_FOUND: ${{ steps.audit.outputs.found }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- dependency-audit -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body.includes(marker));

            if (process.env.AUDIT_FOUND !== 'true') {
              // No high+ vulnerabilities: drop a stale comment if one exists.
              if (existing) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
              }
              return;
            }

            const report = fs.readFileSync('audit.txt', 'utf8').trim();
            const body = [
              marker,
              '## ⚠️ Dependency Audit — 高深刻度の脆弱性を検出',
              '',
              '`npm audit --audit-level=high --omit=dev` が脆弱性を報告しました。',
              'これは report-only でマージはブロックしませんが、内容を確認してください',
              '（あわせてリポジトリの Dependabot alerts も参照）。',
              '',
              '<details><summary>npm audit output</summary>',
              '',
              '```',
              report,
              '```',
              '',
              '</details>',
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [changes, build, lint, test]
    if: always()

    steps:
      - name: Check CI Results
        run: |
          echo "Code changes: ${{ needs.changes.outputs.code }}"
          echo "Build result: ${{ needs.build.result }}"
          echo "Lint result:  ${{ needs.lint.result }}"
          echo "Test result:  ${{ needs.test.result }}"

          if [[ "${{ needs.changes.outputs.code }}" == "true" ]]; then
            echo "Tests were executed. Checking results..."

            if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
              echo "CI failed: one or more jobs failed"
              exit 1
            fi

            if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
              echo "CI cancelled: one or more jobs were cancelled"
              exit 1
            fi

            echo "All checks passed!"
          else
            echo "No code changes detected - skipping tests"
          fi

          echo "CI completed successfully!"

  pr-preview:
    name: PR Preview
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    needs: [changes, build]
    runs-on: ubuntu-latest
    # Elevated above the workflow default: pr-preview-action pushes to the
    # gh-pages branch and posts/updates the preview comment.
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: pr-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Download PR preview artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-preview-dist
          path: dist

      - name: Deploy PR Preview
        uses: koizuka/pr-preview-action@b03654e20a3e1a9c84309ac9a864e6ba3c4d078b # v1.1.1
        with:
          action: deploy
          source-dir: dist
          base-url: https://koizuka.github.io/drawing-practice
          token: ${{ secrets.GITHUB_TOKEN }}

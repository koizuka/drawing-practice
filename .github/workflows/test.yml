name: CI

on:
  pull_request:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'index.html'
              - 'vite.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'src/**'
              - 'tsconfig*.json'
              - 'eslint.config.js'
              - '.github/workflows/test.yml'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Build
        run: npm run build -- --base=${{ github.event_name == 'pull_request' && format('/drawing-practice/pr/{0}/', github.event.pull_request.number) || '/drawing-practice/' }}

      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-preview-dist
          path: dist
          retention-days: 1
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run test

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [changes, build, lint, test]
    if: always()

    steps:
      - name: Check CI Results
        run: |
          echo "Code changes: ${{ needs.changes.outputs.code }}"
          echo "Build result: ${{ needs.build.result }}"
          echo "Lint result:  ${{ needs.lint.result }}"
          echo "Test result:  ${{ needs.test.result }}"

          if [[ "${{ needs.changes.outputs.code }}" == "true" ]]; then
            echo "Tests were executed. Checking results..."

            if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
              echo "CI failed: one or more jobs failed"
              exit 1
            fi

            if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
              echo "CI cancelled: one or more jobs were cancelled"
              exit 1
            fi

            echo "All checks passed!"
          else
            echo "No code changes detected - skipping tests"
          fi

          echo "CI completed successfully!"

  pr-preview:
    name: PR Preview
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    needs: [changes, build]
    runs-on: ubuntu-latest
    concurrency:
      group: pr-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Download PR preview artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-preview-dist
          path: dist

      - name: Deploy PR Preview
        uses: koizuka/pr-preview-action@b03654e20a3e1a9c84309ac9a864e6ba3c4d078b # v1.1.1
        with:
          action: deploy
          source-dir: dist
          base-url: https://koizuka.github.io/drawing-practice
          token: ${{ secrets.GITHUB_TOKEN }}
